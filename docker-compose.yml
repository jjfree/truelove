services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: asia_serious_dating_postgres
    environment:
      POSTGRES_USER: asia_app
      POSTGRES_PASSWORD: asia_app
      POSTGRES_DB: asia_serious_dating
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asia_app -d asia_serious_dating"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: asia_serious_dating_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
